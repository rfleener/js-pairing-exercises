<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World — Random Greetings</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="card">
      <h1>Hello World 🌍</h1>
      <p class="subtitle">Click the button to receive a random greeting.</p>

      <div class="message-box">
        <p id="message"></p>
      </div>

      <button id="greet-btn" class="greet-btn">Greet Me!</button>
    </div>

    <!-- Data file must be loaded before app.js so `greetings` is in scope -->
    <script src="greetings.js"></script>
    <script src="app.js"></script>
  </body>
</html>
