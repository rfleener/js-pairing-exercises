<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello! 🎉</title>

    <!-- canvas-confetti from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <style>
      /* ── Reset & base ── */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        font-family: 'Segoe UI', system-ui, sans-serif;
        overflow: hidden;
      }

      /* ── Hello heading ── */
      .hello {
        font-size: clamp(4rem, 15vw, 10rem);
        font-weight: 900;
        letter-spacing: -0.02em;
        line-height: 1;
        text-align: center;

        /* rainbow gradient text */
        background: linear-gradient(
          90deg,
          #ff6b6b,
          #ffd93d,
          #6bcb77,
          #4d96ff,
          #c77dff,
          #ff6b6b
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;

        /* subtle shimmer animation */
        animation: shimmer 4s linear infinite;

        /* pop-in on load */
        opacity: 0;
        transform: scale(0.6) rotate(-6deg);
        animation: pop-in 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards,
                   shimmer 4s linear 0.9s infinite;
      }

      @keyframes shimmer {
        to { background-position: 200% center; }
      }

      @keyframes pop-in {
        to {
          opacity: 1;
          transform: scale(1) rotate(0deg);
        }
      }

      /* ── Sub-tagline ── */
      .tagline {
        font-size: clamp(1rem, 3vw, 1.4rem);
        color: rgba(255, 255, 255, 0.55);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        opacity: 0;
        animation: fade-up 0.6s ease 0.9s forwards;
      }

      @keyframes fade-up {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── Confetti button ── */
      .btn {
        position: relative;
        padding: 0.85em 2.2em;
        font-size: clamp(1rem, 2.5vw, 1.2rem);
        font-weight: 700;
        letter-spacing: 0.04em;
        color: #fff;
        background: linear-gradient(135deg, #ff6b6b, #c77dff);
        border: none;
        border-radius: 999px;
        cursor: pointer;
        box-shadow: 0 4px 24px rgba(199, 125, 255, 0.45);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        opacity: 0;
        animation: fade-up 0.6s ease 1.2s forwards;
      }

      .btn:hover {
        transform: translateY(-3px) scale(1.04);
        box-shadow: 0 8px 32px rgba(199, 125, 255, 0.65);
      }

      .btn:active {
        transform: translateY(0) scale(0.97);
      }

      /* ── Floating emoji decorations ── */
      .floaters {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: -1;
      }

      .floater {
        position: absolute;
        font-size: 1.6rem;
        opacity: 0.18;
        animation: float linear infinite;
      }

      @keyframes float {
        from { transform: translateY(110vh) rotate(0deg); }
        to   { transform: translateY(-10vh) rotate(360deg); }
      }
    </style>
  </head>
  <body>

    <!-- Floating background emoji -->
    <div class="floaters" id="floaters"></div>

    <h1 class="hello">Hello!</h1>
    <p class="tagline">Welcome to the party 🎊</p>
    <button class="btn" id="confettiBtn">🎉 More Confetti!</button>

    <script>
      /* ─── Confetti helpers ─── */

      function randomInRange(min, max) {
        return Math.random() * (max - min) + min;
      }

      function burstFromCorners() {
        // Left cannon
        confetti({
          particleCount: 80,
          angle: 60,
          spread: 55,
          origin: { x: 0, y: 0.65 },
          colors: ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#c77dff'],
          scalar: 1.1,
        });
        // Right cannon
        confetti({
          particleCount: 80,
          angle: 120,
          spread: 55,
          origin: { x: 1, y: 0.65 },
          colors: ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#c77dff'],
          scalar: 1.1,
        });
      }

      function starBurst() {
        confetti({
          particleCount: 60,
          spread: 360,
          startVelocity: 20,
          origin: { x: 0.5, y: 0.5 },
          shapes: ['star'],
          colors: ['#ffd93d', '#ff6b6b', '#c77dff'],
          gravity: 0.5,
          scalar: 1.4,
        });
      }

      function fullBlast() {
        burstFromCorners();
        setTimeout(starBurst, 200);
        setTimeout(burstFromCorners, 500);
      }

      /* ─── Fire on page load (after heading pops in) ─── */
      window.addEventListener('load', () => {
        setTimeout(fullBlast, 700);
      });

      /* ─── Re-fire on button click ─── */
      document.getElementById('confettiBtn').addEventListener('click', fullBlast);

      /* ─── Floating background emoji ─── */
      const EMOJIS = ['🎉', '✨', '🌟', '🎊', '🍀', '🦄', '🌈', '💫'];
      const floatersEl = document.getElementById('floaters');

      for (let i = 0; i < 18; i++) {
        const span = document.createElement('span');
        span.className = 'floater';
        span.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
        span.style.left = `${randomInRange(0, 100)}%`;
        span.style.animationDuration = `${randomInRange(8, 20)}s`;
        span.style.animationDelay = `-${randomInRange(0, 18)}s`;
        span.style.fontSize = `${randomInRange(1, 2.5)}rem`;
        floatersEl.appendChild(span);
      }
    </script>
  </body>
</html>
